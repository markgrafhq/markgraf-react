name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # OIDC: GitHub mints a short-lived token that npm exchanges for a
      # publish credential via the Trusted Publisher configured on the package.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Node 24 ships npm 11.x, which has the OIDC-based trusted publishing
      # flow built in.  Older Node versions ship npm 10.x and would need a
      # global upgrade, which doesn't work cleanly inside npm itself.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm publish --provenance --access public

  notify:
    needs: [publish]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Discord notify
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS: ${{ needs.publish.result }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 <<'PY'
          import json, os, urllib.request
          status = os.environ["STATUS"]
          ok = status == "success"
          body = json.dumps({"embeds":[{
              "title": f"{'✅' if ok else '❌'} {os.environ['REPO']} {os.environ['REF']}",
              "description": f"npm publish: {status}",
              "url": os.environ["RUN_URL"],
              "color": 3066993 if ok else 15158332,
          }]}).encode()
          req = urllib.request.Request(
              os.environ["WEBHOOK"], data=body,
              headers={"Content-Type": "application/json"})
          urllib.request.urlopen(req).read()
          PY
